[mod-setting-description]
agricultural-roboport-enable-quality=При увімкненні рослини зберігають якість насіння та відображають значки якості. При вимкненні все відстеження якості пропускається (потрібен перезапуск гри).
agricultural-roboport-dense-seeding=Намагається сіяти на кожній клітині (замість кожної 3-ї в стандартному режимі). Це дозволяє більш щільно розміщувати рослини та вимагає більше будівельних роботів (потрібен перезапуск).
agricultural-roboport-max-seeds-per-tick=Максимальна кількість примар насіння, які робопорт розмістить за тік; менші значення зменшують сплески CPU, але сповільнюють початковий посів.
agricultural-roboport-ignore-cliffs=Якщо увімкнено, збір ігноруватиме урвища при виборі цілей для знесення.
agricultural-roboport-debug=Вмикає запис налагоджувальних логів у `script-output/agricultural-roboport.log` для налагодження.
agricultural-roboport-mutation-visualization=Показує літаючий текст при мутації якості рослин під час збору. Відображає покращення/погіршення кольоровими стрілками.
agricultural-roboport-tdm-period=Вікно (в тіках), в якому часове мультиплексування розподіляє роботу. Більші значення сильніше розподіляють роботу.
agricultural-roboport-tdm-tick-interval=Як часто (в тіках) запускається обробник TDM; менші значення запускають його частіше.
agricultural-roboport-seed-checks-per-call=Скільки попередньо обчислених позицій для посіву перевіряється за виклик; менші значення зменшують CPU за виклик.
agricultural-roboport-max-harvest-per-call=Максимальна кількість успішних наказів на знесення за виклик збирання; обмежує пропускну здатність.
agricultural-roboport-harvest-checks-per-call=Кількість осередків сітки врожаю, що перевіряються за виклик; збільшення прискорює покриття за рахунок CPU.
agricultural-roboport-quality-improvement-chance=Шанс (у відсотках), що мутація якості підвищить до наступного рівня якості замість пониження. За замовчуванням 10%. Рослини вищої якості мають трохи менший шанс покращення.
