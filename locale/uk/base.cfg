agricultural-controlled-mutations=Контрольовані мутації


[technology-description]
agricultural-soil-analysis=Вмикає інструмент планування для автоматичного посіву рослин в обраних областях. Працює з будівельними роботами для розміщення примар насіння.
agricultural-controlled-mutations=Вмикає контроль мутацій якості для зібраних рослин. Надає базовий шанс покращення якості, що зменшується на 20% для кожного наступного рівня якості. Забруднення додатково зменшує шанс покращення, збільшуючи шанс мутації.

